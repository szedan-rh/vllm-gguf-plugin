name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release tag references package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = project["tool"]["vllm_gguf_plugin"]["base_version"]
          release_tag = os.environ["RELEASE_TAG"]
          version_tokens = {
              token
              for token in re.split(r"[-+_/]", release_tag)
              if token
          }

          if version not in version_tokens and f"v{version}" not in version_tokens:
              raise SystemExit(
                  f"Release tag {release_tag!r} does not reference pyproject version {version!r}."
              )

          print(f"Building sdist for version {version}")
          PY

      - name: Show package version
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - <<'PY'
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = project["tool"]["vllm_gguf_plugin"]["base_version"]
          print(f"Building TestPyPI sdist for version {version}")
          PY

      - name: Install packaging tools
        run: python -m pip install --upgrade "setuptools>=77.0.3,<81.0.0" build twine

      - name: Build source distribution
        run: python -m build --sdist --no-isolation --skip-dependency-check

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  build-wheel:
    name: Build wheel (${{ matrix.cuda.torch_backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: "12.9"
            container_image: nvidia/cuda:12.9.1-devel-ubuntu20.04
            torch_backend: cu129
            platform_tag: manylinux_2_31_x86_64
            local_version_suffix: +cu129
          - version: "13.0"
            container_image: nvidia/cuda:13.0.0-devel-ubuntu22.04
            torch_backend: cu130
            platform_tag: manylinux_2_35_x86_64
            local_version_suffix: ""

    # Build each wheel from a base image whose glibc floor matches the exported
    # manylinux tag. The release build script still derives arch coverage from
    # the local nvcc version.
    container:
      image: ${{ matrix.cuda.container_image }}

    permissions:
      contents: read

    env:
      DEBIAN_FRONTEND: noninteractive
      VLLM_GGUF_PLUGIN_LOCAL_VERSION_SUFFIX: ${{ matrix.cuda.local_version_suffix }}

    steps:
      - name: Install base tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git

      - name: Check out code
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh \
            | env UV_INSTALL_DIR=/usr/local/bin sh

      - name: Create build venv
        run: |
          uv python install 3.11
          uv venv /opt/build-venv --python 3.11
          echo "/opt/build-venv/bin" >> "$GITHUB_PATH"
          echo "UV_PYTHON=/opt/build-venv/bin/python" >> "$GITHUB_ENV"
          echo "UV_PYTHON_DOWNLOADS=never" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          uv pip install "setuptools>=77.0.3,<81.0.0" build wheel twine
          uv pip install --torch-backend "${{ matrix.cuda.torch_backend }}" "torch>=2.9"

      - name: Build wheel
        run: ./scripts/build_release_wheel.sh

      - name: Retag wheel as ${{ matrix.cuda.platform_tag }}
        run: |
          cd dist
          python -m wheel tags --remove --platform-tag "${{ matrix.cuda.platform_tag }}" ./*.whl

      - name: Check wheel metadata
        run: python -m twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.cuda.torch_backend }}
          path: dist/*.whl

  publish-pypi:
    needs: [build-sdist, build-wheel]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - name: Download source distribution for GitHub Release
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: release-dist

      # Keep the CUDA 12.9 local-version wheel on GitHub Releases only; PyPI
      # and TestPyPI accept upstream public versions, not local version labels.
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel-cu130
          path: dist

      - name: Download wheel artifacts for GitHub Release
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: release-dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*

      - name: Publish package to PyPI
        if: ${{ !github.event.release.prerelease }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-testpypi:
    needs: [build-sdist, build-wheel]
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'release' && github.event.release.prerelease)
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    environment:
      name: testpypi

    steps:
      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel-cu130
          path: dist

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
